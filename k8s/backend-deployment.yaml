apiVersion: apps/v1
kind: Deployment
metadata:
  name: waw-backend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: waw-backend
  template:
    metadata:
      labels:
        app: waw-backend
    spec:
      containers:
        - name: waw-backend
          image: logangibler/waw-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: waw-backend-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: waw-backend-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"